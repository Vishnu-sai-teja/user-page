<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Vishnu Sai Teja Nagabandi</title>
    <script>
      // GitHub Pages SPA redirect: encode the requested path as a query string
      // so index.html can restore it via window.history.replaceState.
      // segmentCount = 1 because the site lives under /user-page/
      var segmentCount = 1
      var l = window.location
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      )
    </script>
  </head>
  <body></body>
</html>
